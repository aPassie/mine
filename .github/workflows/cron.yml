name: cron

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/tick
        env:
          URL: ${{ secrets.APP_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsSL -m 30 -H "Authorization: Bearer $SECRET" "$URL/api/cron/tick"
